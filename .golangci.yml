version: "2"
run:
  concurrency: 4
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    # 正確性
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    # スタイル
    - gocritic
    - revive
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    # 複雑度
    - gocyclo
    - nestif
    - funlen
    - dupl
    # パフォーマンス
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    # セキュリティ & リソース
    - gosec
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    - sqlclosecheck
    - rowserrcheck
    # テスト
    - testifylint
    - thelper
    - usetesting
    # モダン化
    - modernize
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint

  disable:
    - lll
    - prealloc
    - wrapcheck
    - err113
    - mnd
    - iface
    - nakedret
    - noinlineerr
    - gocognit
    - cyclop
    - depguard
    - goheader
    - importas
    - funcorder
    - godoclint
    - varnamelen
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - unparam
    - makezero
    - testpackage
    - wsl_v5 # 小規模プロジェクトにはノイズが多い
    - revive

  exclusions:
    paths:
      - vendor$
      - third_party$

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 13
    nolintlint:
      require-explanation: true
      require-specific: true

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - vendor$
